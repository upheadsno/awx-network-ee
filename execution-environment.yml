# https://ansible.readthedocs.io/projects/builder/en/latest/definition/
version: 3
dependencies:
  ansible_core:
    package_pip: ansible-core
  ansible_runner:
    package_pip: ansible-runner
  python_interpreter:
    package_system: "python3.12"
  system: dependencies/bindep.txt
  galaxy: dependencies/requirements.yml
  python: dependencies/requirements.txt
images:
  base_image:
    name: quay.io/centos/centos:stream9
additional_build_files:
  - src: files/ansible.cfg
    dest: configs
additional_build_steps:
  append_base: |-
    RUN dnf -y update  && \
    dnf -y install glibc-all-langpacks langpacks-en python3.12 python3.12-devel python3.12-pip ca-certificates && \
    update-ca-trust extract && \
    dnf clean all && \
    rm -rf /var/cache/dnf
